name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race ./...
      - name: go build
        run: go build ./...

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: build argus
        run: make build
      - name: run smoke test
        run: ./scripts/smoke/run.sh

  package:
    runs-on: ubuntu-latest
    needs: [test, smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: setup nfpm
        uses: goreleaser/nfpm-action@v2
      - name: make deb
        env:
          VERSION: "0.1.0-build-${{ github.run_number }}"
        run: make deb
      - name: upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: argus-deb
          path: dist/*.deb
          if-no-files-found: error
