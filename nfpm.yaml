name: argus-cd
arch: amd64
platform: linux
version: ${VERSION}
version_schema: semver
section: admin
priority: optional
maintainer: ellipselv <ellipselv@users.noreply.github.com>
description: |
  Lightweight single-binary GitOps continuous deployment agent for
  Docker Compose workloads on Linux VMs. Polls a Git provider for
  branch updates, runs transactional docker compose deploys, and
  rolls back automatically on health-check failure.
vendor: argus-cd
homepage: https://github.com/ellipselv/argus-cd
license: Apache-2.0

depends:
  - docker-ce | docker.io

contents:
  - src: ./bin/arguscd
    dst: /usr/local/bin/arguscd
    file_info:
      mode: 0755

  - src: ./scripts/arguscd.service
    dst: /lib/systemd/system/arguscd.service
    file_info:
      mode: 0644

  - src: ./configs/config.example.toml
    dst: /etc/argus/config.toml.template
    file_info:
      mode: 0644

scripts:
  postinstall: ./scripts/postinstall.sh
  preremove: ./scripts/prerm.sh
