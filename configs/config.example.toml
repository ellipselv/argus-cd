# argus-cd agent config. Default install path: /etc/argus/config.toml
# This file embeds a PAT — chmod 600 in production.

[agent]
id = "node-01"
executor = "docker-compose"
poll_interval = "30s"

[[apps]]
name = "backend"
apps_dir = "/opt/argus/apps/backend"
health_port = 8080
health_path = "/health"
health_timeout = "90s"
health_interval = "5s"
# Optional outbound webhook for this app's deploy_failure and rollback alerts.
webhook_url = ""

  [apps.git]
  provider = "github"                 # "github" or "gitlab"
  repo_url = "https://github.com/me/backend"
  branch = "main"
  compose_path = "docker-compose.yml"
  token = "github_pat_11A..."
  token_obtained_at = 2026-05-20T10:00:00Z
  token_expires_at = 2026-08-20T10:00:00Z

# GitLab example (cloud or self-hosted — API base derived from repo_url host):
#
#   [apps.git]
#   provider = "gitlab"
#   repo_url = "https://gitlab.example.com/group/sub/backend"
#   branch = "main"
#   compose_path = "docker-compose.yml"
#   token = "glpat-..."
#
# Token scopes: read_repository.
